name: CI

on:
  push:
    branches:
      - master  # ou main, selon la branche par défaut de ton repo
  pull_request:
    branches:
      - master  # ou main

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'  # Utilise la version de Python de ton choix

    - name: Install dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt  # Assure-toi que ton fichier requirements.txt est bien présent
        pip install pre-commit

    - name: Run pre-commit hooks
      run: |
        source venv/bin/activate
        pre-commit run --all-files  # Cela exécutera tous les hooks définis dans ton fichier .pre-commit-config.yaml

  tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt  # Installe tes dépendances, y compris les linters et formatters
        pip install pre-commit black flake8

    - name: Run tests with black
      run: |
        source venv/bin/activate
        black --check .  # Vérifie que le formatage du code est correct

    - name: Run tests with flake8
      run: |
        source venv/bin/activate
        flake8 .  # Vérifie le code avec flake8 (linter)
